<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TreeTrader" />
  <link rel="manifest" href="/money-meta/manifest.json" />
  <title>Tree Trader</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --surface2:  #1a1a1a;
      --border:    #2a2a2a;
      --border2:   #3a3a3a;
      --text:      #e8e8e8;
      --muted:     #666666;
      --muted2:    #444444;
      --down:      #e05050;
      --down-dim:  #3a1515;
      --flat:      #888888;
      --flat-dim:  #222222;
      --up:        #4caf7d;
      --up-dim:    #0f2e1c;
      --accent:    #c8a96e;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .pair-badge {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* ── Main scroll area ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Section label ── */
    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── Candle card ── */
    .candle-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .candle-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .candle-item {
      padding: 0 0 0 12px;
      border-left: 1px solid var(--border);
    }

    .candle-item:first-child {
      padding-left: 0;
      border-left: none;
    }

    .candle-label {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .candle-val {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
    }

    .candle-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .rsi-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rsi-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .rsi-val {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
    }

    .timestamp {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    /* ── Model block ── */
    .model-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .model-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .model-name {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .model-ver {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 0.06em;
    }

    .pred-pill {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 4px;
    }

    .pred-pill.down { background: var(--down-dim); color: var(--down); }
    .pred-pill.flat { background: var(--flat-dim); color: var(--flat); }
    .pred-pill.up   { background: var(--up-dim);   color: var(--up);   }

    /* ── Prob bars ── */
    .prob-rows {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .prob-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prob-dir {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      width: 32px;
      flex-shrink: 0;
    }

    .prob-dir.down { color: var(--down); }
    .prob-dir.flat { color: var(--flat); }
    .prob-dir.up   { color: var(--up);   }

    .bar-track {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bar-fill.down { background: var(--down); }
    .bar-fill.flat { background: var(--flat); }
    .bar-fill.up   { background: var(--up);   }

    .prob-pct {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 400;
      color: var(--text);
      width: 38px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Fetch button ── */
    .btn-wrap {
      position: sticky;
      bottom: 0;
      padding: 16px 0 4px;
      background: linear-gradient(transparent, var(--bg) 40%);
    }

    .fetch-btn {
      width: 100%;
      height: 52px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .fetch-btn:hover  { background: var(--surface2); border-color: var(--accent); }
    .fetch-btn:active { transform: scale(0.98); }
    .fetch-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* ── Status bar ── */
    .status-bar {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .status-text {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .status-text.error { color: var(--down); }
    .status-text.ok    { color: var(--up); }

    /* ── Skeleton shimmer ── */
    @keyframes shimmer {
      0%   { opacity: 0.3; }
      50%  { opacity: 0.6; }
      100% { opacity: 0.3; }
    }

    .skeleton {
      background: var(--surface2);
      border-radius: 3px;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 32px 0;
    }

    .empty-state p {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* ── RSI colour ── */
    .rsi-overbought { color: var(--down); }
    .rsi-oversold   { color: var(--up); }
    .rsi-neutral    { color: var(--text); }
  </style>
</head>
<body>

  <header>
    <span class="logo">Tree Trader</span>
    <span class="pair-badge">EUR/USD · H4</span>
  </header>

  <main id="main-content">

    <!-- Candle section -->
    <div>
      <div class="section-label">Latest complete candle</div>
      <div class="candle-card" id="candle-card">
        <div class="empty-state"><p>Press run to fetch data</p></div>
      </div>
    </div>

    <!-- Prediction section -->
    <div>
      <div class="section-label">Model predictions</div>
      <div style="display:flex; flex-direction:column; gap:12px;" id="pred-container">
        <div class="model-block">
          <div class="empty-state"><p>Awaiting inference</p></div>
        </div>
      </div>
    </div>

  </main>

  <!-- Sticky fetch button -->
  <div class="btn-wrap" style="padding: 16px 20px 16px; max-width: 480px; width: 100%; margin: 0 auto;">
    <button class="fetch-btn" id="fetch-btn" onclick="runInference()">
      <svg class="btn-icon" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="2,1 13,7 2,13" fill="currentColor"/>
      </svg>
      Run inference
    </button>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-text" id="status-text"></span>
  </div>

  <script>
    const API_BASE = 'https://tree-trader.up.railway.app';

    const btn       = document.getElementById('fetch-btn');
    const statusEl  = document.getElementById('status-text');
    const candleEl  = document.getElementById('candle-card');
    const predEl    = document.getElementById('pred-container');

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = 'status-text' + (type ? ' ' + type : '');
    }

    function rsiClass(v) {
      if (v >= 70) return 'rsi-overbought';
      if (v <= 30) return 'rsi-oversold';
      return 'rsi-neutral';
    }

    function renderCandle(c) {
      const dt = new Date(c.timestamp);
      dt.setHours(dt.getHours() - 4) // ignore incomplete candle
      const dtStr = dt.toLocaleString('en-SG', {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit',
        hour12: false
      });
      const rsiCls = rsiClass(c.rsi);

      candleEl.innerHTML = `
        <div class="candle-grid">
          <div class="candle-item">
            <div class="candle-label">Open</div>
            <div class="candle-val">${c.open.toFixed(5)}</div>
          </div>
          <div class="candle-item">
            <div class="candle-label">High</div>
            <div class="candle-val">${c.high.toFixed(5)}</div>
          </div>
          <div class="candle-item">
            <div class="candle-label">Low</div>
            <div class="candle-val">${c.low.toFixed(5)}</div>
          </div>
          <div class="candle-item">
            <div class="candle-label">Close</div>
            <div class="candle-val">${c.close.toFixed(5)}</div>
          </div>
        </div>
        <div class="candle-meta">
          <div class="rsi-row">
            <span class="rsi-label">RSI-14</span>
            <span class="rsi-val ${rsiCls}">${c.rsi.toFixed(1)}</span>
          </div>
          <span class="timestamp">${dtStr} SGT</span>
        </div>
      `;
    }

    function renderProbs(probs) {
      const dirs = ['down', 'flat', 'up'];
      return dirs.map(dir, idx => {
        const pct = (probs[String(idx)] * 100).toFixed(1);
        return `
          <div class="prob-row">
            <span class="prob-dir ${dir}">${dir}</span>
            <div class="bar-track">
              <div class="bar-fill ${dir}" style="width: ${pct}%"></div>
            </div>
            <span class="prob-pct">${pct}%</span>
          </div>
        `;
      }).join('');
    }

    function renderPredictions(p) {
      predEl.innerHTML = `
        <div class="model-block">
          <div class="model-header">
            <span class="model-name">XGBoost</span>
            <div style="display:flex; align-items:center; gap:8px;">
              <span class="model-ver">v${p.xgbModelVersion}</span>
              <span class="pred-pill ${p.xgbPred}">${["DOWN", "FLAT", "UP"][Number(p.xgbPred)]}</span>
            </div>
          </div>
          <div class="prob-rows">${renderProbs(p.xgbProbs)}</div>
        </div>

        <div class="model-block">
          <div class="model-header">
            <span class="model-name">CNN-LSTM</span>
            <div style="display:flex; align-items:center; gap:8px;">
              <span class="model-ver">v${p.nnModelVersion}</span>
              <span class="pred-pill ${p.nnPred}">${["DOWN", "FLAT", "UP"][Number(p.nnPred)]}</span>
            </div>
          </div>
          <div class="prob-rows">${renderProbs(p.nnProbs)}</div>
        </div>
      `;
    }

    function setLoading(on) {
      btn.disabled = on;
      btn.innerHTML = on
        ? '<div class="spinner"></div><span>Fetching...</span>'
        : `<svg class="btn-icon" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
             <polygon points="2,1 13,7 2,13" fill="currentColor"/>
           </svg>Run inference`;
    }

    async function runInference() {
      setLoading(true);
      setStatus('Connecting to Railway...');

      try {
        const [candleRes, predRes] = await Promise.all([
          fetch(`${API_BASE}/candle`),
          fetch(`${API_BASE}/predict`)
        ]);

        if (!candleRes.ok) throw new Error(`/candle returned ${candleRes.status}`);
        if (!predRes.ok)   throw new Error(`/predict returned ${predRes.status}`);

        const candle = await candleRes.json();
        const pred   = await predRes.json();

        renderCandle(candle);
        renderPredictions(pred);

        const now = new Date().toLocaleTimeString('en-SG', { hour12: false });
        setStatus(`Last updated ${now}`, 'ok');

      } catch (err) {
        console.error(err);
        setStatus(`Error: ${err.message}`, 'error');
      } finally {
        setLoading(false);
      }
    }

    // Service worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/money-meta/sw.js', { scope: '/money-meta/'}).catch(console.error);
      });
    }
  </script>
</body>
</html>
